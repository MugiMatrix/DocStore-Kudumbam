<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Team Avatar Keyboard Battle</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a12;--s1:#12111f;--s2:#1c1b2e;--s3:#26243d;
  --txt:#f0eeff;--mut:#7c7a9a;--bd:rgba(255,255,255,0.07);
  --r:14px;
  --c1:#a855f7;--c2:#f43f5e;--c3:#22d3ee;--c4:#4ade80;
  --c1d:#7c22c4;--c2d:#be123c;--c3d:#0891b2;--c4d:#16a34a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
.screen{display:none;height:100vh;flex-direction:column;align-items:center;justify-content:center;padding:16px;position:relative;z-index:1;}
.screen.active{display:flex;}
.home-title{font-family:'Bangers',cursive;font-size:clamp(40px,8vw,80px);color:#ff5f40;text-shadow:4px 4px 0 #ec4899,8px 8px 0 rgba(0,0,0,.4);text-align:center;line-height:1;}
.home-sub{color:var(--mut);font-size:15px;margin:12px 0 32px;text-align:center;max-width:420px;line-height:1.6;}
.btn{padding:12px 32px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;transition:all .15s;}
.btn-acc{background:#ff5f40;color:#fff;box-shadow:0 4px 0 #b83a22;}
.btn-acc:hover{transform:translateY(-2px);box-shadow:0 6px 0 #b83a22;}
.btn-ghost{background:var(--s2);color:var(--txt);border:1.5px solid var(--bd);}
.btn-ghost:hover{background:var(--s3);}
.btn-sm{padding:8px 20px;font-size:13px;}
.setup-title{font-family:'Bangers',cursive;font-size:36px;color:#ff5f40;text-align:center;margin-bottom:6px;}
.setup-sub{color:var(--mut);font-size:13px;text-align:center;margin-bottom:24px;}
.players-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:640px;margin-bottom:20px;}
@media(max-width:500px){.players-grid{grid-template-columns:1fr;}}
.player-setup{border-radius:14px;padding:16px;border:2px solid;}
.p1-card{background:rgba(168,85,247,.08);border-color:rgba(168,85,247,.3);}
.p2-card{background:rgba(244,63,94,.08);border-color:rgba(244,63,94,.3);}
.p3-card{background:rgba(34,211,238,.08);border-color:rgba(34,211,238,.3);}
.p4-card{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.3);}
.ps-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ps-key{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Bangers',cursive;font-size:20px;flex-shrink:0;}
.p1k{background:rgba(168,85,247,.3);color:var(--c1);}
.p2k{background:rgba(244,63,94,.3);color:var(--c2);}
.p3k{background:rgba(34,211,238,.3);color:var(--c3);}
.p4k{background:rgba(74,222,128,.3);color:var(--c4);}
.ps-label{font-weight:800;font-size:14px;}
.ps-input{width:100%;background:rgba(0,0,0,.3);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 10px;color:var(--txt);font-family:'Nunito',sans-serif;font-size:13px;outline:none;margin-bottom:8px;}
.ps-input:focus{border-color:rgba(255,255,255,.3);}
.emoji-mini{display:flex;flex-wrap:wrap;gap:5px;}
.em{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.05);border:1.5px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .12s;}
.em:hover{border-color:rgba(255,255,255,.2);}
.em.sel{border-color:currentColor;background:rgba(255,255,255,.1);}
.setup-footer{display:flex;gap:10px;}
.countdown-num{font-family:'Bangers',cursive;font-size:clamp(100px,20vw,180px);color:#ff5f40;text-shadow:6px 6px 0 #ec4899;animation:pulse .5s ease-in-out infinite alternate;line-height:1;}
@keyframes pulse{from{transform:scale(1);}to{transform:scale(1.08);}}
.countdown-label{font-family:'Bangers',cursive;font-size:24px;color:var(--mut);margin-top:8px;}
#s-battle{padding:10px;justify-content:flex-start;}
.battle-top{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:900px;padding:8px 0 12px;}
.battle-title{font-family:'Bangers',cursive;font-size:28px;color:#ff5f40;}
.timer-box{font-family:'Bangers',cursive;font-size:36px;padding:4px 20px;border-radius:50px;border:2px solid rgba(255,95,64,.4);color:#ff5f40;min-width:80px;text-align:center;}
.timer-box.danger{color:#f87171;border-color:rgba(248,113,113,.6);animation:shake .1s ease infinite;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-2px);}75%{transform:translateX(2px);}}
.fighters{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:900px;flex:1;}
@media(max-width:600px){.fighters{grid-template-columns:repeat(2,1fr);}}
.fighter-card{border-radius:16px;padding:14px 10px;display:flex;flex-direction:column;align-items:center;gap:8px;border:2px solid;position:relative;transition:transform .1s;cursor:default;user-select:none;}
.fc1{background:rgba(168,85,247,.1);border-color:rgba(168,85,247,.4);}
.fc2{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.4);}
.fc3{background:rgba(34,211,238,.1);border-color:rgba(34,211,238,.4);}
.fc4{background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.4);}
.fighter-card.eliminated{opacity:.3;filter:grayscale(1);}
.fighter-card.hit{transform:scale(1.06);}
.av{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;border:3px solid;}
.av1{background:rgba(168,85,247,.2);border-color:var(--c1);}
.av2{background:rgba(244,63,94,.2);border-color:var(--c2);}
.av3{background:rgba(34,211,238,.2);border-color:var(--c3);}
.av4{background:rgba(74,222,128,.2);border-color:var(--c4);}
.f-name{font-weight:800;font-size:14px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.key-badge{font-family:'Bangers',cursive;font-size:22px;padding:3px 14px;border-radius:8px;letter-spacing:1px;}
.kb1{background:rgba(168,85,247,.25);color:var(--c1);}
.kb2{background:rgba(244,63,94,.25);color:var(--c2);}
.kb3{background:rgba(34,211,238,.25);color:var(--c3);}
.kb4{background:rgba(74,222,128,.25);color:var(--c4);}
.hp-wrap{width:100%;background:rgba(0,0,0,.4);border-radius:20px;height:10px;overflow:hidden;}
.hp-bar{height:100%;border-radius:20px;transition:width .2s ease;}
.hp1{background:var(--c1);}
.hp2{background:var(--c2);}
.hp3{background:var(--c3);}
.hp4{background:var(--c4);}
.hp-txt{font-size:11px;font-weight:700;color:var(--mut);}
.mash-count{font-family:'Bangers',cursive;font-size:32px;}
.mc1{color:var(--c1);}
.mc2{color:var(--c2);}
.mc3{color:var(--c3);}
.mc4{color:var(--c4);}
.hit-fx{position:absolute;top:8px;right:8px;font-family:'Bangers',cursive;font-size:18px;opacity:0;animation:hitpop .4s ease forwards;}
@keyframes hitpop{0%{opacity:1;transform:scale(1) translateY(0);}100%{opacity:0;transform:scale(1.4) translateY(-16px);}}
.battle-bottom{width:100%;max-width:900px;padding:8px 0 4px;display:flex;justify-content:center;}
.key-hint{font-size:12px;color:var(--mut);text-align:center;}
#s-result{text-align:center;}
.winner-crown{font-size:72px;animation:floaty 2s ease-in-out infinite;display:block;margin-bottom:8px;}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-10px) rotate(3deg);}}
.result-title{font-family:'Bangers',cursive;font-size:clamp(40px,8vw,72px);color:#fbbf24;text-shadow:4px 4px 0 #b45309;line-height:1;}
.winner-av{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;margin:16px auto;border:4px solid;}
.winner-name{font-family:'Bangers',cursive;font-size:clamp(28px,5vw,48px);margin-bottom:4px;}
.winner-stats{color:var(--mut);font-size:13px;margin-bottom:24px;}
.result-footer{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.podium{display:flex;gap:12px;justify-content:center;margin:16px 0;flex-wrap:wrap;}
.podium-item{background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:10px 16px;text-align:center;min-width:80px;}
.pod-rank{font-family:'Bangers',cursive;font-size:22px;}
.pod-name{font-size:12px;font-weight:700;margin-top:2px;}
.pod-score{font-size:11px;color:var(--mut);}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;animation:fall linear forwards;pointer-events:none;}
@keyframes fall{0%{opacity:1;transform:translateY(-10px) rotate(0);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}
</style>
</head>
<body>
<div id="s-home" class="screen active">
  <div style="font-size:60px;animation:floaty 2s ease-in-out infinite;margin-bottom:12px;">⌨️</div>
  <h1 class="home-title">KEYBOARD<br>AH NALLA AMUKKUNGADAA</h1>
  <p class="home-sub">Up to 4 players on one keyboard. Mash your key as fast as you can. Last avatar standing wins!</p>
  <button class="btn btn-acc" onclick="goScreen('s-setup')" style="font-size:16px;padding:13px 40px;">🎮 Set Up Players</button>
</div>
<div id="s-setup" class="screen">
  <div class="setup-title">AALUNGA PER SOLLUNGA BHAA</div>
  <div class="setup-sub">Enter names & pick avatars. Keys are pre-assigned — just start mashing!</div>
  <div class="players-grid" id="players-grid"></div>
  <div class="setup-footer">
    <button class="btn btn-ghost btn-sm" onclick="goScreen('s-home')">← Back</button>
    <button class="btn btn-acc" onclick="startCountdown()">⚔️ Fight!</button>
  </div>
</div>
<div id="s-countdown" class="screen">
  <div class="countdown-num" id="countdown-num">3</div>
  <div class="countdown-label">AMUKKA THAYAARADAA?!</div>
</div>
<div id="s-battle" class="screen">
  <div class="battle-top">
    <div class="battle-title">⚔ PANGUU NALLA AMUKKUU!</div>
    <div class="timer-box" id="timer-box">15</div>
  </div>
  <div class="fighters" id="fighters"></div>
  <div class="battle-bottom">
    <div class="key-hint" id="key-hint"></div>
  </div>
</div>
<div id="s-result" class="screen">
  <span class="winner-crown">👑</span>
  <div class="result-title">WINNER!</div>
  <div class="winner-av" id="w-av"></div>
  <div class="winner-name" id="w-name"></div>
  <div class="winner-stats" id="w-stats"></div>
  <div class="podium" id="podium"></div>
  <div class="result-footer">
    <button class="btn btn-acc" onclick="rematch()">🔄 Rematch Vaa Daa!</button>
    <button class="btn btn-ghost btn-sm" onclick="goScreen('s-setup')">✏️ Change Players</button>
    <button class="btn btn-ghost btn-sm" onclick="goScreen('s-home')">🏠 Home</button>
  </div>
</div>
<script>
const EMOJIS=['🧑‍💻','👩‍💻','🦊','🐼','🐯','🦁','🐸','🌸','⚡','🔥','🌙','🎯','🚀','🎸','🧠','💎','🦋','🐉','🌊','👾'];
const PDATA=[
  {id:0,label:'P1',key:'A',keyCode:'KeyA',cls:'fc1',avcls:'av1',kbcls:'kb1',hpcls:'hp1',mccls:'mc1',color:'var(--c1)',cardcls:'p1-card',pscls:'p1k'},
  {id:1,label:'P2',key:'L',keyCode:'KeyL',cls:'fc2',avcls:'av2',kbcls:'kb2',hpcls:'hp2',mccls:'mc2',color:'var(--c2)',cardcls:'p2-card',pscls:'p2k'},
  {id:2,label:'P3',key:'V',keyCode:'KeyV',cls:'fc3',avcls:'av3',kbcls:'kb3',hpcls:'hp3',mccls:'mc3',color:'var(--c3)',cardcls:'p3-card',pscls:'p3k'},
  {id:3,label:'P4',key:'B',keyCode:'KeyB',cls:'fc4',avcls:'av4',kbcls:'kb4',hpcls:'hp4',mccls:'mc4',color:'var(--c4)',cardcls:'p4-card',pscls:'p4k'},
];
let players=[],gameState={},timerInterval=null,battleDuration=15;
function goScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function initSetup(){
  const grid=document.getElementById('players-grid');grid.innerHTML='';
  PDATA.forEach((p,i)=>{
    const saved=players[i]||{name:'',emoji:EMOJIS[i*3]};
    const card=document.createElement('div');card.className=`player-setup ${p.cardcls}`;
    card.innerHTML=`<div class="ps-header"><div class="ps-key ${p.pscls}">${p.key}</div><div class="ps-label" style="color:${p.color}">${p.label} — Press <b>${p.key}</b></div></div><input class="ps-input" id="name-${i}" placeholder="Enter name..." value="${saved.name}" maxlength="14"/><div class="emoji-mini" id="emoji-${i}"></div>`;
    grid.appendChild(card);
    const emojiRow=card.querySelector(`#emoji-${i}`);
    EMOJIS.forEach(e=>{
      const d=document.createElement('div');d.className='em'+(e===saved.emoji?' sel':'');d.style.color=p.color;d.textContent=e;
      d.onclick=()=>{emojiRow.querySelectorAll('.em').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');};
      emojiRow.appendChild(d);
    });
  });
}
function getSetupData(){return PDATA.map((p,i)=>{const name=document.getElementById(`name-${i}`).value.trim()||p.label;const selEl=document.querySelector(`#emoji-${i} .em.sel`);const emoji=selEl?selEl.textContent:EMOJIS[i*3];return{id:i,name,emoji,...p};});}
function startCountdown(){
  players=getSetupData();goScreen('s-countdown');let n=3;
  const el=document.getElementById('countdown-num');el.textContent=n;
  const iv=setInterval(()=>{n--;if(n<=0){clearInterval(iv);startBattle();}else{el.textContent=n;}},900);
}
function startBattle(){
  gameState={mashes:players.map(()=>0),eliminated:players.map(()=>false),timeLeft:battleDuration,running:true};
  renderFighters();goScreen('s-battle');
  document.getElementById('key-hint').textContent=players.map(p=>`[${p.key}] ${p.name}`).join('   ·   ');
  document.addEventListener('keydown',onKeyDown);
  timerInterval=setInterval(()=>{gameState.timeLeft--;updateTimer();if(gameState.timeLeft<=0)endBattle();},1000);
}
function onKeyDown(e){if(!gameState.running||e.repeat)return;const pi=players.findIndex(p=>p.keyCode===e.code);if(pi===-1||gameState.eliminated[pi])return;gameState.mashes[pi]++;updateFighter(pi);showHitFx(pi);}
function renderFighters(){
  const grid=document.getElementById('fighters');grid.innerHTML='';
  players.forEach((p,i)=>{
    const card=document.createElement('div');card.className=`fighter-card ${p.cls}`;card.id=`fc-${i}`;
    card.innerHTML=`<div class="av ${p.avcls}">${p.emoji}</div><div class="f-name">${p.name}</div><div class="key-badge ${p.kbcls}">${p.key}</div><div class="mash-count ${p.mccls}" id="mc-${i}">0</div><div class="hp-wrap"><div class="hp-bar ${p.hpcls}" id="hp-${i}" style="width:100%"></div></div><div class="hp-txt" id="hpt-${i}">100 HP</div>`;
    grid.appendChild(card);
  });
}
function updateFighter(pi){
  document.getElementById(`mc-${pi}`).textContent=gameState.mashes[pi];
  const max=Math.max(...gameState.mashes);
  players.forEach((_,i)=>{if(gameState.eliminated[i])return;const hp=max===0?100:Math.max(0,Math.round((gameState.mashes[i]/max)*100));const bar=document.getElementById(`hp-${i}`);if(bar)bar.style.width=hp+'%';const txt=document.getElementById(`hpt-${i}`);if(txt)txt.textContent=hp+' HP';});
}
function showHitFx(pi){const card=document.getElementById(`fc-${pi}`);if(!card)return;card.classList.add('hit');const fx=document.createElement('div');fx.className='hit-fx';fx.textContent=['+1','💥','⚡','🔥','✨'][Math.floor(Math.random()*5)];card.appendChild(fx);setTimeout(()=>{card.classList.remove('hit');fx.remove();},400);}
function updateTimer(){const el=document.getElementById('timer-box');el.textContent=gameState.timeLeft;if(gameState.timeLeft<=5)el.classList.add('danger');}
function endBattle(){gameState.running=false;clearInterval(timerInterval);document.removeEventListener('keydown',onKeyDown);const sorted=players.map((p,i)=>({...p,mashes:gameState.mashes[i]})).sort((a,b)=>b.mashes-a.mashes);showResult(sorted);}
function showResult(sorted){
  const winner=sorted[0];const wav=document.getElementById('w-av');wav.textContent=winner.emoji;
  wav.style.background=`rgba(${colorToRgb(winner.color)},.2)`;wav.style.borderColor=winner.color;
  document.getElementById('w-name').textContent=winner.name;document.getElementById('w-name').style.color=winner.color;
  document.getElementById('w-stats').textContent=`${winner.mashes} key mashes in ${battleDuration} seconds 🔥`;
  const podium=document.getElementById('podium');podium.innerHTML='';
  const medals=['🥇','🥈','🥉','4️⃣'];
  sorted.forEach((p,i)=>{const d=document.createElement('div');d.className='podium-item';d.innerHTML=`<div class="pod-rank">${medals[i]}</div><div style="font-size:22px;margin:4px 0;">${p.emoji}</div><div class="pod-name" style="color:${p.color}">${p.name}</div><div class="pod-score">${p.mashes} mashes</div>`;podium.appendChild(d);});
  goScreen('s-result');spawnConfetti(winner.color);
}
function colorToRgb(cssVar){const map={'var(--c1)':'168,85,247','var(--c2)':'244,63,94','var(--c3)':'34,211,238','var(--c4)':'74,222,128'};return map[cssVar]||'255,255,255';}
function rematch(){clearInterval(timerInterval);document.removeEventListener('keydown',onKeyDown);startCountdown();}
function spawnConfetti(winColor){const colors=['#ff5f40','#a855f7','#ec4899','#fbbf24','#2dd4bf','#4ade80',winColor];for(let i=0;i<70;i++){const d=document.createElement('div');d.className='confetti-piece';d.style.left=Math.random()*100+'vw';d.style.background=colors[Math.floor(Math.random()*colors.length)];d.style.width=(6+Math.random()*8)+'px';d.style.height=(6+Math.random()*8)+'px';d.style.animationDuration=(2+Math.random()*2.5)+'s';d.style.animationDelay=(Math.random()*1.5)+'s';d.style.borderRadius=Math.random()>.5?'50%':'2px';d.style.zIndex=999;document.body.appendChild(d);setTimeout(()=>d.remove(),4000);}}
initSetup();
const setupObs=new MutationObserver(()=>{if(document.getElementById('s-setup').classList.contains('active'))initSetup();});
setupObs.observe(document.getElementById('s-setup'),{attributeFilter:['class']});
</script>
</body>
</html>
